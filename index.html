<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gerador de Comunicados PNG • v5.5.0 </title>
  <link rel="icon" type="image/svg+xml" href="./assets/icon.svg">
  <link rel="stylesheet" href="styles.css" />
  <script src="config-imagens.js"></script>
</head>

<body>
  <div id="loginOverlay" class="login-overlay">
  <div class="login-box">
    <h2>Acesso ao Gerador</h2>

    <label for="loginId">ID TCS</label>
    <input
      type="text"
      id="loginId"
      placeholder="Somente números"
      inputmode="numeric"
    />

    <label for="loginAnswer">
      Qual nome da fila no Jira do Service Desk?
    </label>
    <input
      type="text"
      id="loginAnswer"
      placeholder="Digite a resposta"
    />

    <button id="btnLogin">Entrar</button>
    <div class="login-error" id="loginError"></div>
  </div>
</div>
  <div class="form-group">
  <label for="langSelect">Idioma / Language</label>
  <select id="langSelect">
    <option value="pt">Português</option>
    <option value="en">English</option>
  </select>
</div>

  <div class="app">
    <aside class="panel">
      <div class="badge">Gerador de Comunicado PNG • v5.5.0 </div>
      <h1>Gerador de Comunicados PNG</h1>

      <div class="form-group">
        <label for="titulo">Título do comunicado</label>
        <textarea id="titulo"></textarea>
      </div>

      <div class="form-group">
        <label for="imagemSelect">Imagem</label>
        <select id="imagemSelect"></select>
      </div>

      <div class="form-group hidden" id="customUploadWrap">
        <label for="imagemCustom">Selecionar imagem</label>
        <input type="file" id="imagemCustom" accept="image/*" />
      </div>

      <div class="form-group">
        <label>Descrição</label>
        <div class="toolbar">
          <button type="button" class="tool-btn" data-cmd="bold"><b>B</b></button>
          <button type="button" class="tool-btn" data-cmd="italic"><i>I</i></button>
          <button type="button" class="tool-btn" data-cmd="underline"><u>U</u></button>
          <button type="button" class="tool-btn" id="btnParagraph">Nova linha</button>
          <button type="button" class="tool-btn" id="btnClearFormatting">Limpar formato</button>
        </div>
        <div id="textoRich" class="editor" contenteditable="true" placeholder="Digite o texto que aparece logo após a imagem...">
        </div>
      </div>

      <div class="form-group">
        <label for="localidade">Localidade</label>
        <select id="localidade">
          <option value=""></option>
          <option value="Barreiro">Barreiro</option>
          <option value="Jeceaba">Jeceaba</option>
          <option value="Brumadinho">Brumadinho</option>
          <option value="Rio das Ostras">Rio das Ostras</option>
          <option value="Serra">Serra</option>
          <option value="Todas as localidades">Todas as localidades</option>
          <option value="__custom__">Personalizado...</option>
        </select>
      </div>

      <div class="form-group hidden" id="customLocalidadeWrap">
        <label for="localidadeCustom">Localidade personalizada</label>
        <input type="text" id="localidadeCustom" placeholder="Digite a localidade" />
      </div>

      <div class="form-group">
        <label for="evento">Evento</label>
        <textarea id="evento" placeholder="Descreva o evento"></textarea>
      </div>

      <div class="form-group">
        <label for="servicosAfetados">Serviços afetados</label>
        <textarea id="servicosAfetados" placeholder="Descreva os serviços afetados"></textarea>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label for="inicio">Início</label>
          <input type="text" id="inicio" placeholder="Ex.: 23/02/2026 por volta das 01:30" />
        </div>
        <div class="form-group">
          <label for="fim">Fim</label>
          <input type="text" id="fim" placeholder="Ex.: 23/02/2026 às 03:10" />
        </div>
      </div>

      <div class="form-group">
        <label for="mudancaNumero">Mudança número</label>
        <input type="text" id="mudancaNumero" placeholder="Ex.: RFC-123456" />
      </div>

      <div class="form-group">
        <label for="rfc">Identificador</label>
        <input type="text" id="rfc" placeholder="Comunicado 1" />
      </div>

      <div class="form-group">
        <label>Nome do arquivo gerado</label>
        <div class="filename-preview" id="filenamePreview"></div>
      </div>

      <div class="actions">
        <button class="primary" id="btnDownload">Baixar PNG</button>
        <button class="secondary" id="btnReset">Restaurar modelo</button>
      </div>
    </aside>

    <main class="preview-wrap">
      <div class="preview-card">
        <h2 class="preview-title">Prévia do comunicado</h2>
        <canvas id="preview" width="500" height="720"></canvas>
      </div>
    </main>
  </div>
  <script src="script.js"></script>
</body>

</html>
