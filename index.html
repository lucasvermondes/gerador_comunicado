<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gerador de Comunicados PNG • v4</title>
  <link rel="icon" type="image/svg+xml" href="./assets/icon.svg">
  <style>
    :root {
      --roxo: #2d0b73;
      --azul: #1f45a4;
      --cinza: #ececec;
      --texto: #111;
      --borda: #d7d7d7;
      --campo: #cfd6e4;
      --painel: #ffffff;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Calibri, Arial, Helvetica, sans-serif;
      color: var(--texto);
      background: #f5f7fb;
    }
    .app {
      display: grid;
      grid-template-columns: 420px 1fr;
      min-height: 100vh;
    }
    .panel {
      background: var(--painel);
      padding: 20px;
      border-right: 1px solid var(--borda);
      overflow: auto;
    }
    .panel h1 {
      margin: 0 0 8px;
      font-size: 24px;
      color: var(--roxo);
    }
    .panel p.desc {
      margin: 0 0 16px;
      color: #555;
      font-size: 14px;
      line-height: 1.45;
    }
    .badge {
      display: inline-block;
      background: #f0ebff;
      color: var(--roxo);
      padding: 3px 8px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
      margin-bottom: 10px;
    }
    .form-group { margin-bottom: 14px; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    label {
      display: block;
      margin-bottom: 6px;
      font-size: 13px;
      font-weight: 700;
      color: #333;
    }
    input[type="text"], select, textarea {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid var(--campo);
      border-radius: 10px;
      font-size: 14px;
      outline: none;
      background: #fff;
      font-family: Calibri, Arial, Helvetica, sans-serif;
    }
    textarea { min-height: 88px; resize: vertical; line-height: 1.4; }
    input[type="file"] {
      width: 100%;
      padding: 10px;
      border: 1px dashed #a6b1c7;
      border-radius: 10px;
      background: #fbfcff;
    }
    .toolbar { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 8px; }
    .tool-btn {
      border: 1px solid #d6defd;
      background: #ecf0ff;
      color: var(--roxo);
      border-radius: 8px;
      padding: 7px 10px;
      cursor: pointer;
      font-weight: 700;
      min-width: 40px;
      font-size: 13px;
    }
    .editor {
      min-height: 150px;
      border: 1px solid var(--campo);
      border-radius: 10px;
      padding: 12px;
      background: #fff;
      font-size: 16px;
      line-height: 1.45;
      outline: none;
      overflow: auto;
      font-family: Calibri, Arial, Helvetica, sans-serif;
    }
    .editor:empty:before { content: attr(data-placeholder); color: #888; }
    .hint {
      margin-top: 8px;
      font-size: 12px;
      color: #666;
      line-height: 1.4;
    }
    .filename-preview {
      background: #faf8ff;
      color: var(--roxo);
      border: 1px solid #e3dafc;
      border-radius: 10px;
      padding: 10px 12px;
      font-size: 13px;
      word-break: break-word;
      line-height: 1.4;
    }
    .actions { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 16px; }
    button.primary, button.secondary {
      border: none;
      border-radius: 10px;
      padding: 12px 16px;
      cursor: pointer;
      font-weight: 700;
      font-size: 14px;
      font-family: Calibri, Arial, Helvetica, sans-serif;
    }
    button.primary { background: var(--roxo); color: white; }
    button.secondary {
      background: #ecf0ff;
      color: var(--roxo);
      border: 1px solid #d6defd;
    }
    .preview-wrap {
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 24px;
      overflow: auto;
    }
    .preview-card {
      background: #fff;
      padding: 18px;
      border-radius: 16px;
      box-shadow: 0 10px 35px rgba(33, 41, 68, 0.12);
      width: fit-content;
    }
    .preview-title { margin: 0 0 12px; font-size: 16px; color: #333; }
    canvas {
      display: block;
      width: 500px;
      max-width: calc(100vw - 510px);
      height: auto;
      border: 1px solid var(--borda);
      background: #fff;
    }
    .hidden { display: none; }
    @media (max-width: 1020px) {
      .app { grid-template-columns: 1fr; }
      .panel { border-right: none; border-bottom: 1px solid var(--borda); }
      canvas { max-width: calc(100vw - 70px); }
    }
  </style>
  <script src="config-imagens.js"></script>
</head>
<body>
  <div class="app">
    <aside class="panel">
      <div class="badge">Vermondes • Gerador de Comunicado PNG • v4</div>
      <h1>Gerador de Comunicados PNG</h1>
      
      <div class="form-group">
        <label for="titulo">1) Título do comunicado</label>
        <textarea id="titulo"></textarea>
      </div>

      <div class="form-group">
        <label for="imagemSelect">2) Imagem</label>
        <select id="imagemSelect"></select>    
      </div>

      <div class="form-group hidden" id="customUploadWrap">
        <label for="imagemCustom">Selecionar imagem</label>
        <input type="file" id="imagemCustom" accept="image/*" />        
      </div>

      <div class="form-group">
        <label>3) Descrição</label>
        <div class="toolbar">
          <button type="button" class="tool-btn" data-cmd="bold"><b>B</b></button>
          <button type="button" class="tool-btn" data-cmd="italic"><i>I</i></button>
          <button type="button" class="tool-btn" data-cmd="underline"><u>U</u></button>
          <button type="button" class="tool-btn" id="btnParagraph">Nova linha</button>
          <button type="button" class="tool-btn" id="btnClearFormatting">Limpar formato</button>
        </div>
        <div id="textoRich" class="editor" contenteditable="true" data-placeholder="Digite o texto que aparece logo após a imagem...">Prezados(as),<div><br></div><div>Segue abaixo informativo de indisponibilidade:</div></div>      
      </div>

      <div class="form-group">
        <label for="localidade">4) Localidade</label>
        <select id="localidade">
          <option value=""></option>
          <option value="Barreiro">Barreiro</option>
          <option value="Jeceaba">Jeceaba</option>
          <option value="Brumadinho">Brumadinho</option>
          <option value="Rio das Ostras">Rio das Ostras</option>
          <option value="Serra">Serra</option>
          <option value="Todas as localidades">Todas as localidades</option>
          <option value="__custom__">Personalizado...</option>
        </select>
      </div>

      <div class="form-group hidden" id="customLocalidadeWrap">
        <label for="localidadeCustom">Localidade personalizada</label>
        <input type="text" id="localidadeCustom" placeholder="Digite a localidade" />
      </div>

      <div class="form-group">
        <label for="evento">5) Evento</label>
        <textarea id="evento" placeholder="Descreva o evento"></textarea>
      </div>

      <div class="form-group">
        <label for="servicosAfetados">6) Serviços afetados</label>
        <textarea id="servicosAfetados" placeholder="Descreva os serviços afetados"></textarea>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label for="inicio">7) Início</label>
          <input type="text" id="inicio" placeholder="Ex.: 23/02/2026 por volta das 01:30" />
        </div>
        <div class="form-group">
          <label for="fim">8) Fim</label>
          <input type="text" id="fim" placeholder="Ex.: 23/02/2026 às 03:10" />
        </div>
      </div>

      <div class="form-group">
        <label for="mudancaNumero">9) Mudança número</label>
        <input type="text" id="mudancaNumero" placeholder="Ex.: RFC-123456" />
      </div>

      <div class="form-group">
        <label for="rfc">Identificador</label>
        <input type="text" id="rfc"  placeholder="Comunicado 1" />
      </div>

      <div class="form-group">
        <label>Nome do arquivo gerado</label>
        <div class="filename-preview" id="filenamePreview"></div>
        <!-- <div class="hint">Formato de exibição: <strong>ANO/DIA/MÊS - RFC - Título</strong>. No arquivo salvo, barras viram hífens para compatibilidade com Windows.</div> -->
      </div>

      <div class="actions">
        <button class="primary" id="btnDownload">Baixar PNG</button>
        <button class="secondary" id="btnReset">Restaurar modelo</button>
      </div>
    </aside>

    <main class="preview-wrap">
      <div class="preview-card">
        <h2 class="preview-title">Prévia do comunicado</h2>
        <canvas id="preview" width="500" height="720"></canvas>
      </div>
    </main>
  </div>

  <script>
    const canvas = document.getElementById('preview');
    const ctx = canvas.getContext('2d');

    const fields = {
      titulo: document.getElementById('titulo'),
      imagemSelect: document.getElementById('imagemSelect'),
      imagemCustom: document.getElementById('imagemCustom'),
      textoRich: document.getElementById('textoRich'),
      localidade: document.getElementById('localidade'),
      localidadeCustom: document.getElementById('localidadeCustom'),
      evento: document.getElementById('evento'),
      servicosAfetados: document.getElementById('servicosAfetados'),
      inicio: document.getElementById('inicio'),
      fim: document.getElementById('fim'),
      mudancaNumero: document.getElementById('mudancaNumero'),
      rfc: document.getElementById('rfc'),
      filenamePreview: document.getElementById('filenamePreview')
    };

    const customUploadWrap = document.getElementById('customUploadWrap');
    const customLocalidadeWrap = document.getElementById('customLocalidadeWrap');
    const btnDownload = document.getElementById('btnDownload');
    const btnReset = document.getElementById('btnReset');
    const btnParagraph = document.getElementById('btnParagraph');
    const btnClearFormatting = document.getElementById('btnClearFormatting');

    const imageCatalog = Array.isArray(window.COMUNICADO_IMAGES) ? window.COMUNICADO_IMAGES : [];
    let customImage = null;

    function populateImageSelect() {
      fields.imagemSelect.innerHTML = '';
      imageCatalog.forEach((img, index) => {
        const option = document.createElement('option');
        option.value = img.id;
        option.textContent = img.label;
        if (index === 0) option.selected = true;
        fields.imagemSelect.appendChild(option);
      });
      const uploadOption = document.createElement('option');
      uploadOption.value = '__upload__';
      uploadOption.textContent = 'Outro (upload de imagem)';
      fields.imagemSelect.appendChild(uploadOption);
    }

    function getImageSource() {
      if (fields.imagemSelect.value === '__upload__') return customImage;
      const selected = imageCatalog.find(img => img.id === fields.imagemSelect.value);
      return selected ? selected.src : null;
    }

    function loadImage(src) {
      return new Promise((resolve, reject) => {
        if (!src) return reject(new Error('Imagem não definida.'));
        const img = new Image();
        img.onload = () => resolve(img);
        img.onerror = () => reject(new Error('Falha ao carregar imagem: ' + src));
        img.src = src;
      });
    }

    function getTodayParts() {
      const now = new Date();
      const yyyy = now.getFullYear();
      const dd = String(now.getDate()).padStart(2, '0');
      const mm = String(now.getMonth() + 1).padStart(2, '0');
      return { yyyy, mm, dd };
    }

    function sanitizePart(value) {
      return String(value || '')
        .normalize('NFD')
        .replace(/[\u0300-\u036f]/g, '')
        .replace(/[\\/:*?"<>|]+/g, '-')
        .replace(/\s+/g, ' ')
        .trim();
    }

    function buildFileName(displayMode = false) {
      const { yyyy, mm, dd } = getTodayParts();
      const titulo = sanitizePart(fields.titulo.value || 'Sem título');
      const rfc = sanitizePart(fields.rfc.value || 'RFC');
      const datePart = displayMode ? `${yyyy}/${mm}/${dd}` : `${yyyy}-${mm}-${dd}`;
      return `${datePart} - ${rfc} - ${titulo}`;
    }

    function updateFilenamePreview() {
      fields.filenamePreview.textContent = buildFileName(true) + '.png';
    }

    function getLocalidadeValue() {
      if (fields.localidade.value === '__custom__') return fields.localidadeCustom.value.trim();
      return fields.localidade.value.trim();
    }

    function parseRichLines(editor) {
      function parseNode(node, inherited = { bold: false, italic: false, underline: false }) {
        const parts = [];
        if (node.nodeType === Node.TEXT_NODE) {
          const text = node.textContent.replace(/\u00a0/g, ' ');
          if (text) parts.push({ text, ...inherited });
          return parts;
        }
        if (node.nodeType !== Node.ELEMENT_NODE) return parts;
        const tag = node.tagName.toLowerCase();
        const style = {
          bold: inherited.bold || tag === 'b' || tag === 'strong',
          italic: inherited.italic || tag === 'i' || tag === 'em',
          underline: inherited.underline || tag === 'u'
        };
        if (tag === 'br') {
          parts.push({ lineBreak: true });
          return parts;
        }
        for (const child of node.childNodes) parts.push(...parseNode(child, style));
        if (['div', 'p'].includes(tag)) parts.push({ lineBreak: true });
        return parts;
      }
      const raw = [];
      for (const child of editor.childNodes) raw.push(...parseNode(child));
      const lines = [];
      let current = [];
      raw.forEach(part => {
        if (part.lineBreak) {
          lines.push(current);
          current = [];
        } else {
          current.push(part);
        }
      });
      if (current.length || !lines.length) lines.push(current);
      return lines.filter((line, idx, arr) => idx < arr.length - 1 || line.length || arr.length === 1);
    }

    function getWordsFromSegment(segment) {
      return segment.text.split(/(\s+)/).filter(token => token.length > 0).map(token => ({
        text: token,
        bold: segment.bold,
        italic: segment.italic,
        underline: segment.underline
      }));
    }

    function setFont(size, style = {}) {
      const fontParts = [];
      if (style.italic) fontParts.push('italic');
      fontParts.push(style.bold ? '700' : '400');
      fontParts.push(`${size}px`);
      fontParts.push('Calibri, Arial, Helvetica, sans-serif');
      ctx.font = fontParts.join(' ');
      ctx.fillStyle = '#111';
    }

    function wrapRichLines(lines, maxWidth, fontSize) {
      const wrapped = [];
      lines.forEach(lineSegments => {
        const words = lineSegments.flatMap(getWordsFromSegment);
        if (!words.length) { wrapped.push([]); return; }
        let currentLine = [];
        let lineWidth = 0;
        words.forEach(word => {
          setFont(fontSize, word);
          const width = ctx.measureText(word.text).width;
          if (lineWidth + width > maxWidth && currentLine.length && !/^\s+$/.test(word.text)) {
            wrapped.push(currentLine);
            currentLine = [];
            lineWidth = 0;
          }
          currentLine.push({ ...word, width });
          lineWidth += width;
        });
        wrapped.push(currentLine);
      });
      return wrapped;
    }

    function estimateRichHeight(fontSize, maxWidth) {
      const lines = parseRichLines(fields.textoRich);
      const wrapped = wrapRichLines(lines, maxWidth, fontSize);
      const lineHeight = Math.round(fontSize * 1.34);
      let height = 0;
      wrapped.forEach(line => { height += line.length ? lineHeight : Math.round(fontSize * 0.55); });
      return { wrapped, height, lineHeight };
    }

    function wrapPlainText(text, maxWidth, font) {
      ctx.font = font;
      const words = String(text || '').split(/\s+/).filter(Boolean);
      if (!words.length) return [];
      const lines = [];
      let line = '';
      words.forEach(word => {
        const test = line ? `${line} ${word}` : word;
        if (ctx.measureText(test).width > maxWidth && line) {
          lines.push(line);
          line = word;
        } else {
          line = test;
        }
      });
      if (line) lines.push(line);
      return lines;
    }

    function getInfoItems() {
      const items = [];
      const localidade = getLocalidadeValue();
      const evento = fields.evento.value.trim();
      const servicosAfetados = fields.servicosAfetados.value.trim();
      const inicio = fields.inicio.value.trim();
      const fim = fields.fim.value.trim();
      const mudancaNumero = fields.mudancaNumero.value.trim();
      if (localidade) items.push({ label: 'Localidade:', value: localidade });
      if (evento) items.push({ label: 'Evento:', value: evento });
      if (servicosAfetados) items.push({ label: 'Serviços afetados:', value: servicosAfetados });
      if (inicio) items.push({ label: 'Início:', value: inicio });
      if (fim) items.push({ label: 'Fim:', value: fim });
      if (mudancaNumero) items.push({ label: 'Mudança número:', value: mudancaNumero });
      return items;
    }

    function estimateInfoHeight(maxWidth, fontSize) {
      const lineHeight = Math.round(fontSize * 1.34);
      const gapAfterItem = 10;
      let total = 0;
      const items = getInfoItems();
      items.forEach(item => {
        ctx.font = `700 ${fontSize}px Calibri, Arial, sans-serif`;
        const labelWidth = ctx.measureText(item.label + ' ').width;
        const lines = wrapPlainText(item.value, maxWidth - labelWidth, `${fontSize}px Calibri, Arial, sans-serif`);
        total += Math.max(1, lines.length) * lineHeight + gapAfterItem;
      });
      return { items, height: total, lineHeight, gapAfterItem };
    }

    function chooseLayout() {
      let fontSize = 17;
      let chosen = null;
      while (fontSize >= 11) {
        const rich = estimateRichHeight(fontSize, 430);
        const info = estimateInfoHeight(430, fontSize);
        const startY = 250;
        const infoStartY = startY + rich.height + 18;
        const footerY = Math.max(620, infoStartY + info.height + 24);
        const canvasHeight = footerY + 46;
        if (canvasHeight <= 940 || fontSize === 11) {
          chosen = { fontSize, rich, info, startY, infoStartY, footerY, canvasHeight };
          break;
        }
        fontSize -= 1;
      }
      return chosen;
    }

    function drawWrappedHeader(text, x, y, maxWidth, lineHeight) {
      const words = String(text || '').split(/\s+/).filter(Boolean);
      let line = '';
      let currentY = y;
      ctx.font = '700 16px Calibri, Arial, sans-serif';
      ctx.fillStyle = '#fff';
      words.forEach(word => {
        const test = line ? line + ' ' + word : word;
        if (ctx.measureText(test).width > maxWidth && line) {
          ctx.fillText(line, x, currentY);
          line = word;
          currentY += lineHeight;
        } else {
          line = test;
        }
      });
      if (line) ctx.fillText(line, x, currentY);
    }

    function drawRichText(wrappedLines, x, y, lineHeight, fontSize) {
      let currentY = y;
      wrappedLines.forEach(line => {
        let currentX = x;
        if (!line.length) { currentY += Math.round(fontSize * 0.55); return; }
        line.forEach(part => {
          setFont(fontSize, part);
          ctx.fillText(part.text, currentX, currentY);
          if (part.underline && part.text.trim()) {
            const underlineY = currentY + Math.max(2, Math.round(fontSize * 0.10));
            ctx.beginPath();
            ctx.lineWidth = Math.max(1, Math.round(fontSize * 0.06));
            ctx.strokeStyle = '#111';
            ctx.moveTo(currentX, underlineY);
            ctx.lineTo(currentX + part.width, underlineY);
            ctx.stroke();
          }
          currentX += part.width;
        });
        currentY += lineHeight;
      });
      return currentY;
    }

    function drawInfoItems(items, x, y, maxWidth, fontSize, lineHeight, gapAfterItem) {
      let currentY = y;
      items.forEach(item => {
        ctx.font = `700 ${fontSize}px Calibri, Arial, sans-serif`;
        ctx.fillStyle = '#111';
        const labelText = item.label + ' ';
        const labelWidth = ctx.measureText(labelText).width;
        ctx.fillText(labelText, x, currentY);
        const valueLines = wrapPlainText(item.value, maxWidth - labelWidth, `${fontSize}px Calibri, Arial, sans-serif`);
        ctx.font = `${fontSize}px Calibri, Arial, sans-serif`;
        valueLines.forEach((line, index) => {
          ctx.fillText(line, x + labelWidth, currentY);
          if (index < valueLines.length - 1) currentY += lineHeight;
        });
        currentY += lineHeight + gapAfterItem;
      });
      return currentY;
    }

    async function render() {
      updateFilenamePreview();
      const layout = chooseLayout();
      canvas.width = 500;
      canvas.height = Math.ceil(layout.canvasHeight);

      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = '#ececec';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = '#300382';
      ctx.fillRect(0, 0, canvas.width, 62);

      const logo = await loadImage('./assets/header.svg');
      ctx.drawImage(logo, 0, 0, 215, 62);
      drawWrappedHeader(fields.titulo.value, 230, 22, 250, 18);

      const imgBox = { x: 138, y: 76, w: 230, h: 150 };
      /* ctx.fillStyle = '#ffffff';
      ctx.fillRect(imgBox.x, imgBox.y, imgBox.w, imgBox.h); */
      

      const src = getImageSource();
if (src) {
  try {
    const img = await loadImage(src);

    // Mantém proporção real da imagem
    const imgRatio = img.width / img.height;
    const boxRatio = imgBox.w / imgBox.h;

    let drawW, drawH;

    if (imgRatio > boxRatio) {
      // imagem mais larga
      drawW = imgBox.w;
      drawH = imgBox.w / imgRatio;
    } else {
      // imagem mais alta
      drawH = imgBox.h;
      drawW = imgBox.h * imgRatio;
    }

    // Centraliza dentro do box
    const drawX = imgBox.x + (imgBox.w - drawW) / 2;
    const drawY = imgBox.y + (imgBox.h - drawH) / 2;

    ctx.drawImage(img, drawX, drawY, drawW, drawH);

  } catch (err) {
    ctx.fillStyle = '#f3f3f3';
    ctx.fillRect(imgBox.x, imgBox.y, imgBox.w, imgBox.h);
    ctx.strokeStyle = '#b5b5b5';
    ctx.strokeRect(imgBox.x, imgBox.y, imgBox.w, imgBox.h);
    ctx.fillStyle = '#666';
    ctx.font = '400 14px Calibri, Arial, sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('Imagem não encontrada', imgBox.x + imgBox.w / 2, imgBox.y + 72);
    ctx.fillText('Verifique config-imagens.js', imgBox.x + imgBox.w / 2, imgBox.y + 92);
    ctx.textAlign = 'start';
  }
}

      drawRichText(layout.rich.wrapped, 36, layout.startY, layout.rich.lineHeight, layout.fontSize);
      drawInfoItems(layout.info.items, 36, layout.infoStartY, 430, layout.fontSize, layout.info.lineHeight, layout.info.gapAfterItem);

      const footerY = Math.ceil(layout.footerY);
      ctx.fillStyle = '#111';
      ctx.textAlign = 'center';
      ctx.font = '400 12px Calibri, Arial, sans-serif';
      ctx.fillText('Para suporte, ligue para o ramal 2222 ou envie um e-mail para', 250, footerY);
      ctx.fillStyle = '#1f45a4';
      ctx.font = '400 16px Calibri, Arial, sans-serif';
      ctx.fillText('helpdesk-sa@vallourec.com', 250, footerY + 20);
      ctx.fillStyle = '#111';
      ctx.fillText('', 347, footerY + 20);
      ctx.textAlign = 'center';
      ctx.fillStyle = '#1f45a4';
      ctx.fillRect(16, footerY + 28, 468, 8);
    }

    async function downloadPng() {
      await render();
      const link = document.createElement('a');
      link.download = buildFileName(false) + '.png';
      link.href = canvas.toDataURL('image/png');
      link.click();
    }

    function toggleLocalidadeCustom() {
      customLocalidadeWrap.classList.toggle('hidden', fields.localidade.value !== '__custom__');
    }

    function toggleImageUpload() {
      customUploadWrap.classList.toggle('hidden', fields.imagemSelect.value !== '__upload__');
    }

    function resetDefaults() {
      fields.titulo.value = '';
      if (imageCatalog.length) fields.imagemSelect.value = imageCatalog[0].id;
      fields.imagemCustom.value = '';
      customImage = null;
      fields.textoRich.innerHTML = 'Prezados(as),<div><br></div><div>Segue abaixo informativo de indisponibilidade:</div>';
      fields.localidade.value = '';
      fields.localidadeCustom.value = '';
      fields.evento.value = '';
      fields.servicosAfetados.value = '';
      fields.inicio.value = '';
      fields.fim.value = '';
      fields.mudancaNumero.value = '';
      fields.rfc.value = '';
      toggleLocalidadeCustom();
      toggleImageUpload();
      render();
    }

    document.querySelectorAll('[data-cmd]').forEach(btn => {
      btn.addEventListener('click', () => {
        fields.textoRich.focus();
        document.execCommand(btn.dataset.cmd, false, null);
        render();
      });
    });
    btnParagraph.addEventListener('click', () => {
      fields.textoRich.focus();
      document.execCommand('insertHTML', false, '<div><br></div>');
      render();
    });
    btnClearFormatting.addEventListener('click', () => {
      fields.textoRich.focus();
      document.execCommand('removeFormat', false, null);
      render();
    });

    [fields.titulo, fields.evento, fields.servicosAfetados, fields.inicio, fields.fim, fields.mudancaNumero, fields.rfc, fields.localidadeCustom].forEach(el => {
      el.addEventListener('input', render);
      el.addEventListener('change', render);
    });
    
    fields.textoRich.addEventListener('input', render);
    fields.textoRich.addEventListener('keyup', render);
    fields.textoRich.addEventListener('paste', () => setTimeout(render, 0));

    fields.localidade.addEventListener('change', render,() => {
      toggleLocalidadeCustom();
      render();
    });
    fields.imagemSelect.addEventListener('change', render, () => {
      toggleImageUpload();
      render();
    });
    fields.imagemCustom.addEventListener('change', (e) => {
      const file = e.target.files?.[0];
      if (!file) {
        customImage = null;
        render();
        return;
      }
      const reader = new FileReader();
      reader.onload = (evt) => {
        customImage = evt.target.result;
        render();
      };
      reader.readAsDataURL(file);
    });

    btnDownload.addEventListener('click', downloadPng);
    btnReset.addEventListener('click', resetDefaults);

    populateImageSelect();
    toggleLocalidadeCustom();
    toggleImageUpload();
    render();
    fields.imagemSelect.addEventListener('change', () => {
  if (fields.imagemSelect.value === '__upload__') {
    customUploadWrap.classList.remove('hidden');
  } else {
    customUploadWrap.classList.add('hidden');
  }
});
fields.localidade.addEventListener('change', () => {
  if (fields.localidade.value === '__custom__') {
    customLocalidadeWrap.classList.remove('hidden');
  } else {
    customLocalidadeWrap.classList.add('hidden');
  }
});
  </script>
</body>
</html>
